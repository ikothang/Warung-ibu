<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung Ibu - Menu Digital Interaktif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .batik-bg { background-color: #020617; }
    </style>
</head>
<body class="font-sans text-gray-100 bg-navy-950">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // Konfigurasi dikemaskini untuk membaiki ralat auth/configuration-not-found
        const firebaseConfig = {
            apiKey: "AIzaSyDyrX1WmJ67x3w5PDAW6v2yJazT49ZQa7g",
            authDomain: "restoran-dd4bd.firebaseapp.com",
            projectId: "restoran-dd4bd",
            databaseURL: "https://restoran-dd4bd-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "restoran-dd4bd.firebasestorage.app",
            messagingSenderId: "44849081363",
            appId: "1:44849081363:web:1a56f2ebc972f5227be3e6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Autentikasi Tanpa Nama
        signInAnonymously(auth).then(() => {
            console.log("Autentikasi berjaya");
        }).catch((error) => {
            console.error("Ralat Autentikasi:", error.code, error.message);
        });

        // Fungsi Simpan Pesanan
        window.hantarPesananDatabase = async () => {
            try {
                const orderData = {
                    customerName: document.getElementById('customer-name')?.value || "Pelanggan",
                    timestamp: Date.now(),
                    status: "baru"
                };

                const ordersRef = ref(db, 'orders'); 
                const newOrderRef = push(ordersRef);
                await set(newOrderRef, orderData);
                
                alert("Pesanan berjaya dihantar!");
            } catch (error) {
                console.error("Ralat RTDB:", error);
                alert("Gagal menyimpan ke Firebase: " + error.message);
            }
        };
    </script>
</body>
</html>
